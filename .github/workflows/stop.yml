name: stop project

on: workflow_dispatch

jobs:
  stop_project:
    runs-on: ubuntu-22.04
    steps:
      - name: stop project
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          port: ${{ secrets.PORT }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.KEY }}
          script: |
            SERVICE=${{ github.event.repository.name }}.service
            sudo systemctl stop $SERVICE_NAME